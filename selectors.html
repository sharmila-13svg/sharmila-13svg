<!DOCTYPE html>
<html>
    <head>
        <title> Selectors </title>
    </head>

    <body>

        <style>
            .self {
                color:blue;
            }

            .education {
                font-weight:bold;
                font-style:Arial;
                font-size: 10px;
            }

            .sub {
                color: green;
            }
        </style>

        <h2> Element selector </h2>

        <div class="self">
        <p> This is chinnu </p>
        </div>

        <h2> Id selector </h2>

        <div class="education">
        <p> Pursuing B.Tech </p>

        <h2> Class selector </h2>
        </div>

        <div class="education">

        <button class="sub"> Submit </button>
        </div>

    </body>
</html>
