<!DOCTYPE html>
<html>
    <head>
        <title>
            Student Registration form
        </title>
    </head>
    <body bgcolor = "mistyrose">
        <form>
            <table align = "centre" width="700" cellpadding = "10">
                <tr>
                    <td colspan = "2" align="centre">
                        <h1> Student Registration form </h1>
                    </td>

                    <tr>
                        <td> Student name: </td>
                        <td> 
                            <Input type="text" size="21" placeholder="First Name">
                         </td>
                        
                        <tr>
                            <td> Last name: </td>

                            <td>
                                <Input type ="text" Size="21"/> placeholder ="LastName"/>
                            </td>
                        </tr>

                        <tr>
                            <td> Father's name: </td>

                            <td>
                                <input type ="text" size="50"/>
                            </td>
                        </tr>

                        <tr>
                            <td> Date of birth: </td>
                            <td> <input type = "text" size = "3" placeholder = "Day"/> 

                            <input type = "text" size="3" placeholder="month"/>
                            <input type = "text" size="8" placeholder="year"/>
                            <i> (DD-MM-YYYY) </i>

                            </td>
                        </tr>

                        <tr>
                            <td> mobile no: </td>

                            <td>
                                <input type = "text" size = "1" value = "+91"/>
                                <input type = "text" size = "42"/>
                            </td>
                        </tr>

                        <tr>
                            <td> Email id: </td>
                            <td> <input type = "text" size = "50" /> </td>
                        </tr>

                        <tr>
                            <td> Password: </td>
                            <td> 
                                <input type = "password" size = "50"/>
                            </td>
                        </tr>

                        <tr>
                            <td> Gender: </td>
                            <td>
                                <input type = "radio" name = "g" /> Male
                                <input type = "radio" name ="g"/> Female
                            </td>
                        </tr>
                        
                        <tr>
                            <td> Department: </td>
                            <td>
                                <input type = "checkbox"/> CSE
                                <input type = "checkbox"/> IT
                                <input type = "checkbox"/> CIVIL
                                <input type = "checkbox"/> ECE
                                <input type = "checkbox"/> MECH

                                <tr>
                                    <td> course: </td>
                                    <td>
                                        <select>
                                            <option>-------------------select current course's------------------------</option>
                                            <option> Phython </option>
                                            <option> Java </option>
                                            <option> React</option>
                                            <option> DSA </option>
                                            <option> Power bi </option>
                                        </select>
                                    </td>
                                </tr>

                                <tr>
                                    <td> Student Photo: </td>
                                    <td> input type = "file" </td>
                                </tr>

                                <tr>
                                    <td> City: </td>
                                    <td>
                                        <input type = "text" size = "50"/>
                                    </td>
                                </tr>

                                <tr>
                                    <td> Address: </td>
                                    <td> <textarea cols = "48" rows = "5"> </textarea></td>
                                </tr>

                                <tr>
                                    <td colspan = "2" align = "centre">
                                        <input type = "submit" value = "Register"/>
                                    </td>
                                </tr>
                            </td>
                        </tr>
                        
                    </tr>
                </tr>
            </table>
        </form>
    </body>
</html>
